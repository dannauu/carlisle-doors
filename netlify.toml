# Netlify configuration for the Carlisle Overhead Doors Next.js site.
# Netlify auto-detects Next.js and provisions its Next Runtime (v5+),
# which handles App Router pages, ISR, and next/image optimization
# automatically.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the gallery images
[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
